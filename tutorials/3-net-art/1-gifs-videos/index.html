<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>video</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main>
        <iframe width="560" height="315"
            src="https://www.youtube.com/embed/yQUiw4r77FU?si=XMV2iSagtB7_sW7J&autoplay=1&mute=1&loop=1"
            title="YouTube video player" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <img src="media/meow.gif" alt="cat" class="meow">
        <div class="cat">
            <p>meow meow meow meow meow meow meow meow</p>
            <img src="media/meow.gif" alt="cat" class="meow2">
        </div>
        <!-- autoplay video-->
        <video autoplay muted loop>
            <source src="media/video.mp4" type="video/mp4">
        </video>
        <!-- hover videos -->
        <video class="hover-video" muted loop>
            <source src="media/video.mp4" type="video/mp4">
        </video>
        <video class="hover-video" muted loop>
            <source src="media/video.mp4" type="video/mp4">
        </video>
        <!-- click on play video -->
        <video class="click-video" muted loop>
            <source src="media/video.mp4" type="video/mp4">
        </video>

        <video id="webcam" autoplay playsinline></video>
    </main>
    <script src="js/video.js"></script>
    <script src="js/webcam.js"></script>
</body>

</html>
